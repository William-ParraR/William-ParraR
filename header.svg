<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .prompt { font-family: 'Courier New', monospace; font-size: 36px; fill: #3fb950; }
      .name { font-family: 'Courier New', monospace; font-size: 36px; fill: #58a6ff; letter-spacing: 3px; }
      .sub { font-family: 'Courier New', monospace; font-size: 14px; fill: #8b949e; letter-spacing: 2px; }
      .dot { fill: #3fb950; }
      .cursor {
        font-family: 'Courier New', monospace;
        font-size: 36px;
        fill: #58a6ff;
        animation: blink 1s step-start infinite;
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .reveal {
        animation: typing 2.6s steps(26, end) 0.3s both;
      }
      .reveal-sub {
        animation: typing 1.5s steps(15, end) 3.2s both;
      }
      @keyframes typing {
        from { clip-path: inset(0 100% 0 0); }
        to   { clip-path: inset(0 0% 0 0); }
      }
      .cursor-hide {
        animation: cursorMove 2.6s steps(26, end) 0.3s both;
      }
      @keyframes cursorMove {
        from { transform: translateX(0px); }
        to   { transform: translateX(624px); }
      }
    </style>
  </defs>

  <rect width="800" height="120" class="bg" rx="12"/>

  <!-- Prompt -->
  <text x="24" y="58" class="prompt">❯</text>

  <!-- Animated name reveal -->
  <g class="reveal">
    <text x="62" y="58" class="name">WILLIAM ANDRES PARRA RUEDA</text>
  </g>

  <!-- Blinking cursor -->
  <text x="66" y="58" class="cursor">|</text>

  <!-- Subtitle -->
  <g class="reveal-sub">
    <text x="62" y="92" class="sub">Ing. Electrónico  ·  Full Stack Developer  ·  AI Engineer</text>
  </g>

</svg>
